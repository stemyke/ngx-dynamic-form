<div class="header">
    <dropdown-box>
        <ng-container toggle-content>
            {{ schema() }}
        </ng-container>
        <ul>
            @for (s of schemas(); track s) {
                <li [ngClass]="{active: s === schema()}" (click)="schema.set(s)">
                    {{ s }}
                </li>
            }
        </ul>
    </dropdown-box>
    <div class="field-language">
        <a *ngFor="let lang of language.languages"
           class="btn"
           [ngClass]="lang == language.editLanguage ? 'btn-primary' : 'btn-secondary'" (click)="language.editLanguage = lang">
            {{ lang }}
        </a>
    </div>
</div>
<div class="row">
    <div class="col-6">
        @if (fields.hasValue()) {
            <dynamic-form [fields]="fields.value()" [data]="plainData()" [useTabs]="true" #form>
                <button type="button" [async-submit]="submit" [form]="form" class="btn btn-primary submit-button">Submit</button>
            </dynamic-form>
        } @else {
            <div class="form-generation-error">
                {{ fields.error() }}
            </div>
        }
    </div>
    <div class="col-6">
        <dynamic-form globalTemplatePrefix="test-form" [data]="decoratorData()" [useTabs]="true" #decoratorForm>
            <ng-template input="displayName" let-formControl="formControl">
                <span style="color:red">{{ formControl.value }}</span>
            </ng-template>
            <ng-template label="infoButton" let-label="label" let-props="props" let-id="id">
                <label class="field-label" [for]="id">
                    <span [innerHTML]="label | safe: 'html'"></span>
                    <button class="btn btn-primary field-description" *ngIf="props.description" (click)="info(props.description)">i</button>
                    @if (props.markRequired) {
                        <span class="field-required" aria-hidden="true">*</span>
                    }
                </label>
            </ng-template>
            <button type="button" [async-submit]="submit" [form]="decoratorForm" class="btn btn-primary submit-button">Submit</button>
        </dynamic-form>
    </div>
</div>
<ng-template globalTemplate="test-form-control-displayImage" let-formControl="formControl">
    <img alt="img" [src]="formControl.value | safe: 'url'" *ngIf="formControl.value"/>
</ng-template>
