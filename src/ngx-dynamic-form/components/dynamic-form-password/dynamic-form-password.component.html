<div class="form-password-group">
    <input #input
           class="form-control"
           [attr.type]="type()"
           [attr.data-testid]="field.testId"
           [formControl]="formControl"
           [formlyAttributes]="field" />
    <btn type="transparent"
         [icon]="icon()"
         [attr.data-testid]="field.testId + '-toggle'"
         (mousedown)="switchType()"></btn>
</div>
